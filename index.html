<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorty | Your url shortener</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link href="./dist/output.css" rel="stylesheet">
    <script type="module" src="./src/main.js" defer></script>
</head>

<body>
    <!-- NAVBAR -->
    <header role="banner" class="w-full bg-base-100 shadow-sm">
        <nav role="navigation" class="navbar max-w-6xl mx-auto px-4">
            <!-- LOGO -->
            <div id="nav-logo" class="flex-1">
                <a href="#" class="flex items-center gap-2 text-xl font-bold">
                    <i class="fa-solid fa-link"></i>
                    <h1>Shorty</h1>
                </a>
            </div>

            <div id="nav-links" class="hidden md:flex items-center justify-between gap-6">
                <ul class="flex gap-6">
                    <li><a href="#features">Features</a></li>
                    <li><a href="#how-it-works">How It Works</a></li>
                    <li><a href="#help">Help</a></li>
                </ul>

                <div id="get-started">
                    <a href="#hero" id="get-started" class="btn btn-primary mt-2 text-white">Get Started</a>
                </div>
            </div>
             
            <!-- Mobile Nav -->
            <div class="flex-none md:hidden">
                <div class="dropdown dropdown-end">
                    <label tabindex="0" class="btn btn-ghost btn-circle">
                        <i class="fa-solid fa-bars-staggered"></i>
                    </label>
                    <ul tabindex="0" class="menu menu-sm dropdown-content mt-3 p-2 shadow bg-base-100 rounded-box w-52">
                        <li><a href="#features">Features</a></li>
                        <li><a href="#how-it-works">How It Works</a></li>
                        <li><a href="#help">Help</a></li>
                        <li>
                            <a href="#hero" class="btn btn-primary mt-2 text-white">
                                Get Started
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- HERO -->
        <section id="hero">
            <div class="hero-content">
                <h1>Shorter Links, Instant Magic</h1>
                <p>Transform long URLs into short, shareable links with ease. Perfect for social media, marketing, and
                    more.</p>
                <div id="cta-form-container">
                    <form id="shorten-form">
                        <label for="url-input">Your Long URL:</label>
                        <input type="text" name="url" id="url-input" placeholder="www.example.com/long-link..."
                            required>
                        <button type="submit" id="submit-btn">Get Your Shorty</button>

                    </form>

                    <!-- RESULT -->
                    <div id="result" hidden>
                        <p id="result-label">Your Shorty is ready:</p>
                        <a href="#" id="short-url" target="_blank"></a>
                        <button id="copy-btn">Copy</button>
                    </div>

                    <!-- Error message placeholder -->
                    <p id="error-message" hidden></p>
                </div>

                <div class="saved-links-container">
                    <div id="links-list"></div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
