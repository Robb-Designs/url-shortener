<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorty | Your url shortener</title>
    <link rel="stylesheet" href="./style/styles.css">
    <script defer src="./src/main.js"></script>
</head>

<body>
    <!-- NAVBAR -->
    <header role="banner">
        <nav role="navigation">
            <!-- LOGO -->
            <div id="nav-logo">
                <a href="#">
                    <span>logoPlaceHolder</span>
                    <h1>Shorty</h1>
                </a>
            </div>

            <div id="nav-links">
                <ul>
                    <li><a href="#about">About</a></li>
                    <li><a href="#features">Features</a></li>
                    <li><a href="#how-it-works">How It Works</a></li>
                    <li><a href="#help">Help</a></li>
                </ul>

                <div id="get-started">
                    <a href="#hero" id="get-started">Get Started</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- HERO -->
        <section id="hero">
            <div class="hero-content">
                <h1>Shorter Links, Instant Magic</h1>
                <p>Transform long URLs into short, shareable links with ease. Perfect for social media, marketing, and
                    more.</p>
                <div id="cta-form-container">
                    <form id="shorten-form">
                        <label for="url-input">Your Long URL:</label>
                        <input type="url" name="url" id="url-input" placeholder="Paste your long URL here..." required>
                        <button type="submit" id="submit-btn">Get Your Shorty</button>
                    </form>

                    <!-- LOADING -->
                    <div id="loading" hidden>
                        <p>Shortening...</p>
                    </div>

                    <!-- RESULT -->
                    <div id="result" hidden>
                        <a href="#" id="short-url" target="_blank"></a>
                        <button id="copy-btn">Copy</button>
                    </div>

                    <!-- Error message placeholder -->
                    <p id="error-message" hidden></p>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
